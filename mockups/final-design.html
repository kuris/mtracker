<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가계부 - 최종 디자인 (투명한 신비로움)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1635 50%, #0d0f20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .phone-mockup {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 0 40px rgba(100, 150, 255, 0.15),
                        0 0 80px rgba(50, 100, 200, 0.08),
                        inset 0 0 40px rgba(100, 150, 255, 0.05);
            border: 1px solid rgba(150, 180, 255, 0.2);
            position: relative;
        }

        .phone-mockup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1635 100%);
            border-radius: 45px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 44px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(150, 180, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 12px;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.3);
            border-radius: 2px;
        }

        /* 글래스모피즘 - 극도로 투명 */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(150, 180, 255, 0.12);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2),
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* 헤더 */
        .header {
            text-align: center;
        }

        .header .label {
            font-size: 11px;
            color: rgba(150, 180, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        /* 진행률 원형 */
        .progress-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(100, 150, 255, 0.08);
            border: 1.5px solid rgba(150, 180, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.08),
                        inset 0 0 20px rgba(100, 150, 255, 0.04);
            position: relative;
        }

        .progress-percent {
            font-size: 44px;
            font-weight: 700;
            color: #8eb4f0;
            letter-spacing: -1px;
        }

        .progress-label {
            font-size: 10px;
            color: rgba(150, 180, 255, 0.5);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 상태 메시지 */
        .status-message {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 4px;
        }

        .status-emoji {
            font-size: 24px;
            margin-top: 4px;
            opacity: 0.8;
        }

        .amount-text {
            font-size: 12px;
            color: rgba(150, 180, 255, 0.5);
            margin-top: 10px;
        }

        /* 카테고리 카드 */
        .category-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(150, 180, 255, 0.1);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(150, 180, 255, 0.15);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.1);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .category-name {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.85);
        }

        .category-emoji {
            font-size: 16px;
        }

        .category-amount {
            font-size: 12px;
            color: rgba(150, 180, 255, 0.5);
        }

        .category-progress {
            height: 5px;
            background: rgba(150, 180, 255, 0.08);
            border-radius: 2.5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, rgba(100, 150, 255, 0.6), rgba(120, 170, 255, 0.8));
            border-radius: 2.5px;
            box-shadow: 0 0 8px rgba(100, 150, 255, 0.4);
        }

        .category-count {
            display: flex;
            gap: 6px;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .category-count-text {
            font-size: 11px;
            color: rgba(150, 180, 255, 0.6);
        }

        .category-count-text strong {
            color: rgba(140, 180, 255, 0.8);
            font-weight: 600;
        }

        /* 버튼 */
        .fab {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.4), rgba(120, 180, 255, 0.3));
            border: 1.5px solid rgba(150, 180, 255, 0.3);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.2),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 50;
            color: rgba(200, 220, 255, 0.9);
            backdrop-filter: blur(20px);
        }

        .fab:hover {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.5), rgba(120, 180, 255, 0.4));
            border-color: rgba(150, 180, 255, 0.4);
            box-shadow: 0 0 25px rgba(100, 150, 255, 0.3);
            transform: translateX(-50%) scale(1.08);
        }

        /* 정보 텍스트 */
        .info {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: rgba(150, 180, 255, 0.6);
        }

        .info h3 {
            color: rgba(200, 220, 255, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div>
        <div class="phone-mockup">
            <div class="screen">
                <div class="status-bar">
                    <span>9:41</span>
                    <span>📶 📡 🔋</span>
                </div>

                <div class="content">
                    <!-- 헤더 -->
                    <div class="header glass">
                        <div class="label">오늘의 목표</div>

                        <!-- 진행률 원형 -->
                        <div class="progress-circle">
                            <div class="progress-percent">60%</div>
                            <div class="progress-label">사용 중</div>
                        </div>

                        <div class="status-message">절약했어요</div>
                        <div class="status-emoji">❄️</div>
                        <div class="amount-text">20,000 / 50,000원</div>
                    </div>

                    <!-- 카테고리 1: 커피 -->
                    <div class="category-card">
                        <div class="category-header">
                            <div class="category-name">
                                <span class="category-emoji">☕</span>
                                커피
                            </div>
                            <div class="category-amount">3,800원</div>
                        </div>
                        <div class="category-progress">
                            <div class="progress-bar" style="width: 33%"></div>
                        </div>
                        <div class="category-count">
                            ☕ ☕ <span style="opacity: 0.3;">⭕</span>
                        </div>
                        <div class="category-count-text">
                            <strong>2잔 남았어요</strong>
                        </div>
                    </div>

                    <!-- 카테고리 2: 식비 -->
                    <div class="category-card">
                        <div class="category-header">
                            <div class="category-name">
                                <span class="category-emoji">🍽️</span>
                                식비
                            </div>
                            <div class="category-amount">12,000원</div>
                        </div>
                        <div class="category-progress">
                            <div class="progress-bar" style="width: 60%"></div>
                        </div>
                        <div class="category-count-text" style="margin-top: 6px;">
                            <strong>8,000원 남음</strong>
                        </div>
                    </div>

                    <!-- 카테고리 3: 쇼핑 -->
                    <div class="category-card">
                        <div class="category-header">
                            <div class="category-name">
                                <span class="category-emoji">🛍️</span>
                                쇼핑
                            </div>
                            <div class="category-amount">8,000원</div>
                        </div>
                        <div class="category-progress">
                            <div class="progress-bar" style="width: 53%"></div>
                        </div>
                        <div class="category-count-text" style="margin-top: 6px;">
                            <strong>7,000원 남음</strong>
                        </div>
                    </div>

                    <!-- 카테고리 4: 교통비 -->
                    <div class="category-card">
                        <div class="category-header">
                            <div class="category-name">
                                <span class="category-emoji">🚌</span>
                                교통비
                            </div>
                            <div class="category-amount">0원</div>
                        </div>
                        <div class="category-progress">
                            <div class="progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="category-count-text" style="margin-top: 6px;">
                            <strong>5,000원 남음</strong>
                        </div>
                    </div>
                </div>

                <!-- FAB 버튼 -->
                <div class="fab">+</div>
            </div>
        </div>

        <div class="info">
            <h3>✨ 투명한 신비로움</h3>
            <p>극도로 투명한 글래스모피즘 + 차분한 파랑 톤<br>
            깔끔하면서도 신비로운 미니멀 디자인</p>
        </div>
    </div>
</body>
</html>
